<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Report</title>
    <style>
    /* ===== GLOBAL ===== */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    background:
        linear-gradient(rgba(238,241,246,0.65), rgba(238,241,246,0.65)),
        url("/images/banasthali-bg.jpg");
    background-size: cover;
    background-position: center;
}

/* ===== PAGE WRAPPER ===== */
.page-box {
    max-width: 1000px;
    margin: 70px auto;
    padding: 0 20px;
}

/* ===== MAIN CARD ===== */
.container {
    background: #1f2937;
    padding: 45px 50px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    color: #e5e7eb;
}

/* ===== HEADINGS ===== */
.container h1,
.container h2,
.container h3 {
    color: #ffffff;
    margin-bottom: 25px;
}

/* ===== LABELS ===== */
label,
p,
strong {
    color: #c7d2fe;
    font-weight: 500;
}

/* ===== INPUTS ===== */
.container input,
.container select {
    width: 320px;
    max-width: 100%;
    padding: 12px 14px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #111827;
    color: #ffffff;
    font-size: 14px;
    margin: 10px 15px 20px 0;
}

.container input:focus,
.container select:focus {
    outline: none;
    border-color: #4a6fe3;
}

/* ===== DATE RANGE INLINE ===== */
.date-row {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
}

/* ===== BUTTON ===== */
button {
    margin-top: 30px;
    padding: 12px 28px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    background: #4a6fe3;
    color: white;
    border: none;
}

button:hover {
    background: #3a5bd8;
}
</style>
</head>
<body>
<div class="page-box">
     <div class="container">
<h2>Generate Employee Report</h2>

<form th:action="@{/reports/search}" method="post">

    <!-- Employee ID -->
    <h4>Search by Employee ID</h4>
    <input type="number" name="employeeId" placeholder="Employee ID">

    <hr>
<div class="date-row">
    <!-- Date Range -->
    <h4>Date of Joining</h4>
    From:
    <input type="date" name="fromDate">
    To:
    <input type="date" name="toDate">
</div>
    <hr>

    <!-- Department -->
    <h4>Department</h4>
    <input type="text" name="department">

    <!-- Employee Class -->
    <h4>Employee Class</h4>
    <input type="text" name="employeeClass">

    <!-- Designation -->
    <h4>Designation</h4>
    <input type="text" name="designation">

    <br><br>

    <!-- Submit -->
    <button type="submit">Generate Report</button>

</form>

<!-- Optional message -->
<p th:if="${message}" th:text="${message}" style="color:red;"></p>
</div>
</div>
</body>
</html>
