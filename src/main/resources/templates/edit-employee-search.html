<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Employee</title>
    <style>
      /* ================= GLOBAL ================= */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    background:
        linear-gradient(rgba(238,241,246,0.65), rgba(238,241,246,0.65)),
        url("/images/banasthali-bg.jpg");
    background-size: cover;
    background-position: center;
}

/* ================= PAGE WRAPPER ================= */
.page-box {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* ================= MAIN CARD ================= */
.container {
    background: #1f2937;
    width: 420px;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    color: #e5e7eb;
    text-align: center;
}

/* ================= TITLE ================= */
.container h2 {
    margin-bottom: 25px;
    color: #ffffff;
}

/* ================= INPUT ================= */
input[type="text"],
input[type="number"] {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #111827;
    color: #ffffff;
    margin-bottom: 18px;
}

input::placeholder {
    color: #9ca3af;
}

input:focus {
    outline: none;
    border-color: #4a6fe3;
}

/* ================= SEARCH BUTTON ================= */
button {
    width: 100%;
    padding: 12px;
    background: #4a6fe3;
    color: #ffffff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
}

button:hover {
    background: #3a5bd8;
}

/* ================= DIVIDER ================= */
hr {
    border: none;
    border-top: 1px solid #374151;
    margin: 22px 0;
}

/* ================= BACK LINK ================= */
a {
    color: #93c5fd;
    text-decoration: none;
    font-size: 14px;
}

a:hover {
    text-decoration: underline;
    color: #bfdbfe;
}





    </style>
</head>

<body>
 <div class="page-box">
<div class="container">
    <h2>Edit Employee</h2>

    <form action="/admin/editEmployee" method="get">
        <input type="number" name="employeeId"
               placeholder="Enter Employee ID"
               required style="width:100%; padding:10px">

        <br><br>

        <button type="submit" class="btn">Search</button>
    </form>

    <hr>

    <div style="text-align:center">
        <a href="/admin/home" class="btn">Back to Dashboard</a>
    </div>
</div>
</div>
</body>
</html>
