<style>
    body {
        font-family: "Segoe UI", Arial, sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        background:
            linear-gradient(rgba(238,241,246,0.55), rgba(238,241,246,0.55)),
            url("/images/banasthali-bg.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    .page-box {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: #1f2937;
        width: 520px;              /* smaller than before */
        padding: 36px;
        border-radius: 14px;
        box-shadow: 0 22px 45px rgba(0,0,0,0.28);
        text-align: center;
        color: #e5e7eb;
    }

    h1 {
        margin: 0;
        font-size: 26px;
        color: #ffffff;
    }

    h3 {
        margin-top: 6px;
        font-size: 14px;
        font-weight: normal;
        color: #cbd5e1;
    }

    .btn-box {
        margin-top: 30px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
    }

    .action-btn,
    .btn {
        padding: 13px;
        font-size: 15px;
        border-radius: 8px;
        text-decoration: none;
        background: #4a6fe3;
        color: #ffffff;
        text-align: center;
        transition: 0.25s ease;
    }

    .action-btn:hover,
    .btn:hover {
        background: #3a5bd8;
    }

    /* Generate Report same size, not oversized */
    .btn-box a:nth-child(5) {
        grid-column: span 2;
    }

    .logout-form {
        margin-top: 26px;
    }

    .logout-btn {
        padding: 10px 28px;
        background: transparent;
        color: #cbd5e1;
        border: 1px solid #9ca3af;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }

    .logout-btn:hover {
        background: #374151;
        color: #ffffff;
    }
    /* BUTTON CONTAINER */
.btn-box {
    margin-top: 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

/* LIGHT BOX BUTTON STYLE */
.btn-box a {
    background: #f8fafc;              /* light box */
    color: #1f2937;                   /* dark text */
    padding: 14px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    text-align: center;
    border: 1px solid #e5e7eb;
    box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    transition: all 0.25s ease;
}

/* HOVER EFFECT */
.btn-box a:hover {
    background: #4a6fe3;
    color: #ffffff;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(74,111,227,0.35);
}

/* Generate Report → center & same size */
.btn-box a:nth-child(5) {
    grid-column: span 2;
}

/* LOGOUT BUTTON */
.logout-btn {
    margin-top: 26px;
    padding: 10px 30px;
    background: transparent;
    color: #e5e7eb;
    border: 1px solid #9ca3af;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
}

.logout-btn:hover {
    background: #374151;
    color: #ffffff;
}
</style>
 <div class="page-box">
<div class="container">

    <h1>Welcome Sub-Admin</h1>
    <h3>Employee Management System</h3>

    <div class="btn-box">
        <a href="/employee/view?role=subadmin" class="action-btn">View Employee</a>
        <a href="/reports" class="btn">Generate Report</a>
    </div>

    <form action="/logout/subadmin" method="post">
        <button class="logout-btn">Logout</button>
    </form>
</div>
</div>
