<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>

    <style>
    body {
        margin: 0;
        height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        background: url('/images/banasthali-bg.jpg') center/cover no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* 🔹 lighter overlay = more visible background */
    .overlay {
        position: absolute;
        inset: 0;
        background: rgba(240, 243, 248, 0.82);
    }

    /* 🔹 dark professional card */
    .login-card {
        position: relative;
        background: #1f2d3d;
        width: 420px;
        padding: 35px 30px;
        border-radius: 14px;
        box-shadow: 0 25px 45px rgba(0,0,0,0.25);
        text-align: center;
        z-index: 2;
    }

    .logos {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 15px;
    }

    .logos img {
        height: 65px;
        background: white;
        padding: 6px;
        border-radius: 8px;
    }

    h1 {
        margin: 12px 0 6px;
        font-size: 22px;
        color: #ffffff;
    }

    p {
        margin: 0 0 25px;
        color: #cbd5e1;
        font-size: 14px;
    }

    .btn {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        font-size: 15px;
        border-radius: 8px;
        border: none;
        background: #f9fafb;
        cursor: pointer;
        transition: all 0.25s ease;
    }

    .btn:hover {
        background: #e0e7ff;
        transform: translateY(-1px);
    }
</style>
</head>

<body>
<div class="overlay"></div>

<div class="login-card">

    <div class="logos">
        <img src="/images/logo.jpg" alt="Banasthali">
        <img src="/images/users.jpg" alt="EMS">
    </div>

    <h1>Employee Management System</h1>
    <p>Select Login Type</p>

    <a href="/login?role=admin">
        <button class="btn">Login as Admin</button>
    </a>

    <a href="/login?role=subadmin">
        <button class="btn">Login as Sub-Admin</button>
    </a>

</div>
</body>
</html>
