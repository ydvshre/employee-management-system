<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Employee</title>

    <style>
        /* ================= GLOBAL ================= */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    background:
        linear-gradient(rgba(238,241,246,0.65), rgba(238,241,246,0.65)),
        url("/images/banasthali-bg.jpg");
    background-size: cover;
    background-position: center;
}

/* ================= PAGE WRAPPER ================= */
.page-box {
    max-width: 1100px;
    margin: 60px auto;
    padding: 0 20px;
}

/* ================= MAIN CARD ================= */
.container {
    background: #1f2937;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    color: #e5e7eb;
}

/* ================= TITLES ================= */
h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #ffffff;
}

/* ================= REMOVE TABS ================= */
.tabs {
    display: none;
}

/* ================= SECTIONS ================= */
.form-section {
    display: block !important;
    margin-bottom: 40px;
}

/* Section heading (Department / Personal) */
.section-heading {
    font-size: 18px;
    font-weight: 600;
    color: #c7d2fe;
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid #374151;
}

/* ================= ROW LAYOUT ================= */
.row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
}

/* ================= INPUTS ================= */
input,
select {
    flex: 1;
    padding: 11px 12px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #111827;
    color: #ffffff;
    font-size: 14px;
}

input::placeholder {
    color: #9ca3af;
}

input:focus,
select:focus {
    outline: none;
    border-color: #4a6fe3;
}

/* ================= READONLY EMP ID ================= */
.readonly-id {
    flex: 1;
    padding: 12px;
    border-radius: 6px;
    background: #374151;
    color: #ffffff;
    font-weight: 600;
}

/* ================= DATE FIELD ================= */
.date-field {
    position: relative;
    flex: 1;
}

.date-field input {
    width: 100%;
    padding: 12px;
}

.date-field label {
    position: absolute;
    top: 50%;
    left: 10px;
    transform: translateY(-50%);
    font-size: 12px;
    color: #9ca3af;
    background: #1f2937;
    padding: 0 6px;
    pointer-events: none;
    transition: 0.3s;
}

.date-field input:focus + label,
.date-field input:not(:placeholder-shown) + label {
    top: -7px;
    font-size: 11px;
}

/* ================= FOOTER BUTTONS ================= */
.footer-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

/* ================= BUTTONS ================= */
.btn {
    padding: 12px 26px;
    border-radius: 6px;
    border: none;
    background: #4a6fe3;
    color: #ffffff;
    font-size: 15px;
    cursor: pointer;
}

.btn:hover {
    background: #3a5bd8;
}

/* ================= ERROR TEXT ================= */
.error {
    color: #f87171;
    font-size: 13px;
}
</style>


    <script>
        function showTab(tabId) {
            document.getElementById("dept").classList.remove("active");
            document.getElementById("personal").classList.remove("active");
            document.getElementById(tabId).classList.add("active");

            document.getElementById("tab1").classList.remove("active");
            document.getElementById("tab2").classList.remove("active");
            document.getElementById(tabId === 'dept' ? "tab1" : "tab2").classList.add("active");
        }

        function toggleContractDates(value) {
            document.getElementById("contractDates").style.display =
                value === 'Contract' ? 'block' : 'none';
        }

        function toggleSpouse(value) {
            document.getElementById("spouseRow").style.display =
                value === 'Married' ? 'flex' : 'none';
        }

        function validateIdentity() {
            const aadhaar = document.getElementById("aadhaar").value.trim();
            const license = document.getElementById("license").value.trim();
            if (aadhaar === "" && license === "") {
                alert("Please provide Aadhaar OR Driving License");
                return false;
            }
            return true;
        }
    </script>
</head>

<body>
 <div class="page-box">
<div class="container">

<h2>Add Employee</h2>

<div class="tabs">
    <div class="tab active" id="tab1" onclick="showTab('dept')">Department Info</div>
    <div class="tab" id="tab2" onclick="showTab('personal')">Personal Info</div>
</div>

<form method="post"
      action="/admin/saveEmployee"
      th:object="${employee}"
      onsubmit="return validateIdentity()">
<!-- 🔴 GLOBAL VALIDATION ERRORS -->
<div th:if="${#fields.hasErrors('*')}"
     style="background:#ffe6e6; color:#b30000; 
            padding:12px; border-radius:6px; 
            margin-bottom:20px;">

    <b>Please fix the following errors:</b>
    <ul>
        <li th:each="err : ${#fields.errors('*')}"
            th:text="${err}">
        </li>
    </ul>
</div>
<!-- ================= DEPARTMENT ================= -->
<div class="form-section active" id="dept">
<h3 class="section-heading">Department Information</h3>
<div class="row">
    <div class="readonly-id">
        Employee ID: <span th:text="${nextEmployeeId}"></span>
    </div>
    <input type="text" name="title" placeholder="Title">
</div>

<div class="row">
    <input type="text" name="firstName" placeholder="First Name *"
           pattern="[A-Za-z ]+" required>

    <input type="text" name="middleName" placeholder="Middle Name"
           pattern="[A-Za-z ]*">

    <input type="text" name="lastName" placeholder="Last Name *"
           pattern="[A-Za-z ]+" required>
</div>

<div class="row">
    <input type="text" name="department" placeholder="Department *" required>
    <input type="text" name="designation" placeholder="Designation">
</div>

<div class="row">
    <input type="text" name="payScale" placeholder="Pay Scale *" required>
    <input type="number" name="basicSalary" placeholder="Basic Salary *" min="0" required>
</div>

<div class="row">
    <select name="employeeClass">
        <option value="">Employee Class</option>
        <option>Upper</option>
        <option>Middle</option>
        <option>Lower</option>
    </select>

    <select name="natureOfAppointment" onchange="toggleContractDates(this.value)">
        <option value="">Nature of Appointment</option>
        <option>Permanent</option>
        <option>Contract</option>
    </select>
</div>

<div class="row">
    <div class="date-field">
        <input type="date" name="dateOfJoining" required>
        <label>Date of Joining</label>
    </div>
</div>

<div id="contractDates" style="display:none;">
    <div class="row">
        <div class="date-field">
            <input type="date" name="contractStartDate">
            <label>Contract Start</label>
        </div>
        <div class="date-field">
            <input type="date" name="contractEndDate">
            <label>Contract End</label>
        </div>
    </div>
</div>

<div class="row">
    <div class="date-field">
        <input type="date" name="confirmationDate">
        <label>Confirmation Date</label>
    </div>
</div>

</div>

<!-- ================= PERSONAL ================= -->
<div class="form-section" id="personal">
<h3 class="section-heading">Personal Information</h3>
<div class="row">
    <input type="text" name="fatherName" placeholder="Father Name" pattern="[A-Za-z ]*">
    <input type="text" name="motherName" placeholder="Mother Name" pattern="[A-Za-z ]*">
</div>

<div class="row">
    <select name="maritalStatus" onchange="toggleSpouse(this.value)">
        <option value="">Marital Status</option>
        <option>Single</option>
        <option>Married</option>
    </select>

    <select name="gender">
        <option value="">Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>
</div>

<div class="row" id="spouseRow" style="display:none;">
    <input type="text" name="spouseName" placeholder="Spouse Name" pattern="[A-Za-z ]*">
</div>

<div class="row">
    <div class="date-field">
       <input type="date"
       th:field="*{dateOfBirth}"
       required
       max="2006-12-31">


        <label>Date of Birth</label>
    </div>
</div>

<div class="row">
    <div class="field">
        <label>Aadhaar Number (12 digits)</label>
        <input type="text"
               id="aadhaar"
               name="aadhaarNumber"
               th:field="*{aadhaarNumber}"
               maxlength="12"
               pattern="[0-9]{12}"
               title="Aadhaar must be exactly 12 digits">
        <small class="error" th:errors="*{aadhaarNumber}"></small>
    </div>

    <div class="field">
        <label>Driving License Number (16 characters)</label>
        <input type="text"
               id="license"
               name="drivingLicenseNumber"
               th:field="*{drivingLicenseNumber}"
               maxlength="16"
               pattern="[A-Za-z0-9]{16}"
               title="License must be exactly 16 alphanumeric characters">
        <small class="error" th:errors="*{drivingLicenseNumber}"></small>
    </div>
</div>

<div class="row">
    <select name="category">
        <option value="">Category</option>
        <option>General</option>
        <option>OBC</option>
        <option>SC</option>
        <option>ST</option>
    </select>
</div>

<div class="row">
    <input type="email" name="email" placeholder="Email">
    <input type="text" name="mobile"
           placeholder="Mobile Number"
           pattern="[0-9]{10}">
</div>

<div class="row">
    <input type="text" name="address" placeholder="Address">
</div>

<div class="row">
    <input type="text" name="city" placeholder="City">
    <input type="text" name="state" placeholder="State">
</div>
<div th:if="${error}" style="color:red; text-align:center; margin-bottom:15px;">
    <p th:text="${error}"></p>
</div>

</div>

<div class="footer-buttons">
    <button type="submit" class="btn">Save Employee</button>
    <a href="/admin/home" class="btn">Back to Dashboard</a>
</div>

</form>

</div>
</div>
</body>
</html>
