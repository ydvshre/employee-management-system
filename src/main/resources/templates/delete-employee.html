<!DOCTYPE html>
<html>
<head>
    <title>Delete Employee</title>

    <style>
       /* ================= GLOBAL ================= */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    background:
        linear-gradient(rgba(238,241,246,0.65), rgba(238,241,246,0.65)),
        url("/images/banasthali-bg.jpg");
    background-size: cover;
    background-position: center;
}

/* ================= PAGE WRAPPER ================= */
.page-box {
    max-width: 800px;
    margin: 80px auto;
    padding: 0 20px;
}

/* ================= MAIN CARD ================= */
.container {
    background: #1f2937;
    padding: 50px 40px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    color: #e5e7eb;
    text-align: center;
}

/* ================= TITLE ================= */
.container h2 {
    margin-bottom: 35px;
    color: #ffffff;
}

/* ================= INPUT ================= */
input[type="text"] {
    width: 100%;
    max-width: 420px;
    padding: 14px 16px;
    font-size: 15px;

    border-radius: 10px;
    border: 1px solid #374151;

    background: linear-gradient(
        180deg,
        #0f172a 0%,
        #020617 100%
    );

    color: #ffffff;

    box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.05),
        0 6px 18px rgba(0,0,0,0.35);

    margin: 0 auto 22px;
    display: block;
}
input[type="text"]:focus {
    border-color: #4a6fe3;
    box-shadow:
        0 0 0 3px rgba(74,111,227,0.25),
        0 8px 20px rgba(0,0,0,0.4);
}

input::placeholder {
    color: #9ca3af;
}

input:focus {
    outline: none;
    border-color: #4a6fe3;
}

/* ================= BUTTONS ================= */
/* ================= BUTTON GROUP ================= */
.buttons {
    margin-top: 25px;          /* FIX spacing */
    display: flex;
    justify-content: center;
    gap: 18px;                 /* horizontal spacing between buttons */
}

/* ================= DELETE BUTTON ================= */
.buttons button {
    width: 200px;
    padding: 12px 0;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: #ef4444;
    color: white;
}

.buttons button:hover {
    background: #dc2626;
}

/* ================= BACK BUTTON ================= */
.buttons a {
    width: 200px;
    padding: 12px 0;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    color: #e5e7eb;
    border: 1px solid #6b7280;
    display: flex;
    align-items: center;
    justify-content: center;
}

.buttons a:hover {
    background: rgba(255,255,255,0.06);
}
/* ===== FORCE DELETE INPUT TO MATCH THEME ===== */
.container input[type="text"] {
    background: linear-gradient(
        180deg,
        #0f172a 0%,
        #020617 100%
    ) !important;

    color: #ffffff !important;
    border: 1px solid #374151 !important;
    border-radius: 10px !important;

    padding: 14px 16px !important;
    font-size: 15px !important;

    max-width: 420px;
    width: 100%;

    box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.06),
        0 8px 22px rgba(0,0,0,0.35);
}

/* focus glow */
.container input[type="text"]:focus {
    outline: none;
    border-color: #4a6fe3 !important;
    box-shadow:
        0 0 0 3px rgba(74,111,227,0.25),
        0 10px 24px rgba(0,0,0,0.45);
}
/* ===== FORCE STYLE ALL INPUTS (DELETE PAGE FIX) ===== */
.container input {
    background: linear-gradient(180deg, #0f172a, #020617) !important;
    color: #ffffff !important;

    border: 1px solid #374151 !important;
    border-radius: 10px !important;

    padding: 14px 16px !important;
    font-size: 15px !important;

    width: 420px !important;
    max-width: 90% !important;

    display: block;
    margin: 0 auto 30px auto !important;

    box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.05),
        0 10px 25px rgba(0,0,0,0.35) !important;
}

.container input:focus {
    outline: none !important;
    border-color: #4a6fe3 !important;
    box-shadow:
        0 0 0 3px rgba(74,111,227,0.25),
        0 12px 30px rgba(0,0,0,0.45) !important;
}
    </style>
</head>

<body>
 <div class="page-box">
<div class="container">

    <h2>Delete Employee</h2>

    <form action="/admin/deleteEmployee" method="post"
          onsubmit="return confirm('Are you sure you want to delete this employee?');">

        <input type="number"
               name="employeeId"
               placeholder="Enter Employee ID"
               required>

        <br>
<div class="buttons">
        <button type="submit" class="btn">Delete Employee</button>
    </form>

    <br>

    <a href="/admin/home" class="btn">Back to Dashboard</a>
</div>
</div>
</div>
</body>
</html>
