<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Employee</title>

    <style>
/* ================= GLOBAL ================= */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    background:
        linear-gradient(rgba(238,241,246,0.65), rgba(238,241,246,0.65)),
        url("/images/banasthali-bg.jpg");
    background-size: cover;
    background-position: center;
}

/* ================= PAGE WRAPPER ================= */
.page-box {
    max-width: 1200px;
    margin: 60px auto;
    padding: 40px;
}

/* ================= MAIN CARD ================= */
.container {
    background: #1f2937;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    color: #e5e7eb;
}

/* ================= TITLE ================= */
.container h2 {
    text-align: center;
    margin-bottom: 35px;
    color: #ffffff;
}

/* ================= SECTION HEADINGS ================= */
.section-title {
    margin: 35px 0 20px;
    font-size: 17px;
    font-weight: 600;
    color: #c7d2fe;
    border-bottom: 1px solid #374151;
    padding-bottom: 8px;
}

/* ================= FORM LAYOUT ================= */
.form-section {
    margin-bottom: 30px;
}

/* ================= ROWS ================= */
.row {
    display: flex;
    gap: 18px;
    margin-bottom: 16px;
    align-items: center;
}

/* Prevent ugly stretching */
.row > input,
.row > select {
    flex: 1;
}

/* ================= INPUTS ================= */
input,
select {
    padding: 11px 12px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #111827;
    color: #ffffff;
    font-size: 14px;
}

input::placeholder {
    color: #9ca3af;
}

input:focus,
select:focus {
    outline: none;
    border-color: #4a6fe3;
}

/* ================= READONLY ID ================= */
.readonly-id {
    padding: 12px;
    border-radius: 6px;
    background: #f3f4f6;
    color: #111827;
    font-weight: 600;
    border: none;
}

/* ================= DATE INPUT ================= */
input[type="date"] {
    color-scheme: dark;
}

/* ================= FOOTER BUTTONS ================= */
.footer-buttons {
    margin-top: 45px;
    padding-top: 25px;
    border-top: 1px solid #374151;
    display: flex;
    justify-content: center;
    gap: 20px;
}

/* Same size buttons */
.footer-buttons button,
.footer-buttons a {
    width: 200px;
    padding: 12px 0;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Primary */
.footer-buttons button {
    background: #4a6fe3;
    color: white;
    border: none;
}

.footer-buttons button:hover {
    background: #3a5bd8;
}

/* Secondary */
.footer-buttons a {
    background: transparent;
    color: #e5e7eb;
    border: 1px solid #6b7280;
}

.footer-buttons a:hover {
    background: rgba(255,255,255,0.06);
}

/* ================= REMOVE TABS COMPLETELY ================= */
.tabs {
    display: none;
}

/* Ensure both sections are visible */
.form-section {
    display: block;
}
/* ================= FORCE CONSISTENT ROW LAYOUT ================= */

/* Default rows = 2 columns */
.row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    column-gap: 36px;   /* horizontal space */
    row-gap: 22px;      /* vertical stays balanced */
}

/* Rows with 3 inputs (name row) */
.row:has(input:nth-child(3)),
.row:has(select:nth-child(3)) {
    grid-template-columns: repeat(3, 1fr);
}

/* Single-field rows */
.row:has(input:only-child),
.row:has(select:only-child) {
    grid-template-columns: 1fr;
    max-width: 50%;
}

/* Date fields don’t stretch weirdly */
input[type="date"] {
    width: 100%;
}
/* ================= FIX EDIT EMPLOYEE BUTTON ALIGNMENT ================= */

/* Make edit form buttons behave like add form */
.buttons {
    margin-top: 45px;
    padding-top: 25px;
    border-top: 1px solid #374151;
    display: flex;
    justify-content: center;
    gap: 20px;
}

/* Same size buttons */
.buttons .btn {
    width: 200px;
    padding: 12px 0;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    text-decoration: none;

    display: flex;
    align-items: center;
    justify-content: center;
    
}

/* Primary button */
.buttons button.btn {
    background: #4a6fe3;
    color: #ffffff;
    border: none;
}

.buttons button.btn:hover {
    background: #3a5bd8;
}

/* Secondary button */
.buttons a.btn {
    background: transparent;
    color: #e5e7eb;
    border: 1px solid #6b7280;
}

.buttons a.btn:hover {
    background: rgba(255,255,255,0.06);
}
/* === FIX ALIGNMENT BETWEEN ADD & EDIT FORMS === */
.row .field {
    display: flex;
    flex-direction: column;
    width: 100%;
}

.row .field > input,
.row .field > select {
    width: 100%;
}


    </style>

    <script>
        function showTab(tabId) {
            document.getElementById("dept").classList.remove("active");
            document.getElementById("personal").classList.remove("active");
            document.getElementById(tabId).classList.add("active");

            document.getElementById("tab1").classList.remove("active");
            document.getElementById("tab2").classList.remove("active");
            document.getElementById(tabId === 'dept' ? "tab1" : "tab2").classList.add("active");
        }

        function toggleContract(value) {
            const row = document.getElementById("contractRow");
            row.style.display = (value === 'Contract') ? 'flex' : 'none';
        }


        window.onload = function () {
            const select = document.querySelector('[name="natureOfAppointment"]');
            if (select) toggleContract(select.value);
        };
    </script>
</head>

<body>
 <div class="page-box">
<div class="container">
<h2>Edit Employee</h2>

<!-- <div class="tabs">
    <div class="tab active" id="tab1" onclick="showTab('dept')">Department Info</div>
    <div class="tab" id="tab2" onclick="showTab('personal')">Personal Info</div>
</div> -->

<form action="/admin/updateEmployee"
      method="post"
      th:object="${employee}">

<input type="hidden" th:field="*{employeeId}"/>

<!-- ================= DEPARTMENT ================= -->
<div class="form-section active" id="dept">
<div class="section-title">Department Info</div>
<div class="row">
    <div class="field">
        <label>Title</label>
        <input type="text" th:field="*{title}">
    </div>
    <div class="field">
        <label>Department *</label>
        <input type="text" th:field="*{department}" required>
    </div>
</div>

<div class="row">
    <div class="field">
        <label>First Name *</label>
        <input type="text" th:field="*{firstName}" required>
        <small class="error" th:errors="*{firstName}"></small>
    </div>
    <div class="field">
        <label>Middle Name</label>
        <input type="text" th:field="*{middleName}">
    </div>
    <div class="field">
        <label>Last Name *</label>
        <input type="text" th:field="*{lastName}" required>
        <small class="error" th:errors="*{lastName}"></small>
    </div>
</div>

<div class="row">
    <div class="field">
        <label>Designation</label>
        <input type="text" th:field="*{designation}">
    </div>
    <div class="field">
        <label>Employee Class</label>
        <select th:field="*{employeeClass}">
            <option value="">Select</option>
            <option value="Upper">Upper</option>
            <option value="Middle">Middle</option>
            <option value="Lower">Lower</option>
        </select>
    </div>
</div>

<div class="row">
    <div class="field">
        <label>Pay Scale *</label>
        <input type="text" th:field="*{payScale}" required>
    </div>
    <div class="field">
        <label>Basic Salary *</label>
        <input type="number" th:field="*{basicSalary}" required>
    </div>
</div>

<div class="row">
    <div class="field">
        <label>Nature of Appointment *</label>
        <select th:field="*{natureOfAppointment}"
                name="natureOfAppointment"
                onchange="toggleContract(this.value)"
                required>
            <option value="">Select</option>
            <option value="Permanent">Permanent</option>
            <option value="Contract">Contract</option>
        </select>
    </div>
    <div class="field">
        <label>Date of Joining *</label>
        <input type="date" th:field="*{dateOfJoining}" required>
    </div>
</div>

<div class="row">
    <div class="field">
        <label>Confirmation Date</label>
        <input type="date" th:field="*{confirmationDate}">
    </div>
</div>

<div class="row" id="contractRow" style="display:none">
    <div class="field">
        <label>Contract Start</label>
        <input type="date" th:field="*{contractStartDate}">
    </div>
    <div class="field">
        <label>Contract End</label>
        <input type="date" th:field="*{contractEndDate}">
    </div>
</div>

</div>

<!-- ================= PERSONAL ================= -->
<div class="form-section" id="personal">
<div class="section-title">Personal Info</div>
<div class="row">
    <div class="field">
        <label>Father Name</label>
        <input type="text" th:field="*{fatherName}">
        <small class="error" th:errors="*{fatherName}"></small>
    </div>
    <div class="field">
        <label>Mother Name</label>
        <input type="text" th:field="*{motherName}">
        <small class="error" th:errors="*{motherName}"></small>
    </div>
</div>
<div class="row">
    <div class="field">
        <label>Marital Status</label>
        <select th:field="*{maritalStatus}">
            <option value="">Select</option>
            <option value="Single">Single</option>
            <option value="Married">Married</option>
        </select>
    </div>
    <div class="field">
        <label>Gender</label>
        <select th:field="*{gender}">
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>
    </div>
</div>

<div class="row">
    <div class="field">
        <label>Date of Birth *</label>
        <input type="date" th:field="*{dateOfBirth}" required>
        <small class="error" th:errors="*{dateOfBirth}"></small>
    </div>
    <div class="field">
        <label>Category</label>
        <select th:field="*{category}">
            <option value="">Select</option>
            <option value="General">General</option>
            <option value="OBC">OBC</option>
            <option value="SC">SC</option>
            <option value="ST">ST</option>
        </select>
    </div>
</div>

<div class="row">
    <div class="field">
        <label>Aadhaar Number</label>
        <input type="text" id="aadhaar"
               th:field="*{aadhaarNumber}"
               pattern="[0-9]{12}"
               maxlength="12">
        <small class="error" th:errors="*{aadhaarNumber}"></small>
    </div>
    <div class="field">
        <label>Driving License Number</label>
        <input type="text" id="license"
               th:field="*{drivingLicenseNumber}"
               pattern="[A-Za-z0-9]{16}"
               maxlength="16">
        <small class="error" th:errors="*{drivingLicenseNumber}"></small>
    </div>
</div>
<div class="row">
    <div class="field">
        <label>Email</label>
        <input type="email" th:field="*{email}">
        <small class="error" th:errors="*{email}"></small>
    </div>
    <div class="field">
        <label>Mobile</label>
        <input type="text" th:field="*{mobile}">
        <small class="error" th:errors="*{mobile}"></small>
    </div>
</div>
<div class="row">
    <div class="field">
        <label>Address</label>
        <input type="text" th:field="*{address}">
    </div>
</div>
<div class="row">
    <div class="field">
        <label>City</label>
        <input type="text" th:field="*{city}">
    </div>
    <div class="field">
        <label>State</label>
        <input type="text" th:field="*{state}">
    </div>
</div>
<div th:if="${error}" style="color:red; text-align:center; margin-bottom:15px;">
    <p th:text="${error}"></p>
</div>

</div>

<div class="footer-buttons">
    <button type="submit" class="btn">Update Employee</button>
    <a href="/admin/home" class="btn">Back</a>
</div>

</form>
</div>
</div>
</body>
</html>
