<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

   <style>
/* ===== PAGE BACKGROUND ===== */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background:
        linear-gradient(rgba(238,241,246,0.6), rgba(238,241,246,0.6)),
        url("/images/banasthali-bg.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* ===== LOGIN CARD ===== */
.login-box {
    background: #1f2937;
    padding: 32px;
    width: 380px;
    border-radius: 12px;
    box-shadow: 0 18px 36px rgba(0,0,0,0.25);
    text-align: center;
    color: #e5e7eb;
}

/* ===== LOGO ===== */
.logo {
    width: 75px;
    margin-bottom: 12px;
}

/* ===== HEADINGS ===== */
h2 {
    margin: 10px 0 6px;
    font-size: 22px;
    color: #ffffff;
}

p {
    margin-top: 0;
    font-size: 14px;
    color: #cbd5e1;
}

/* ===== INPUT + BUTTON (SAME SIZE FIX) ===== */
input,
button {
    width: 100%;
    height: 44px;              /* 🔑 equal height */
    padding: 0 12px;
    margin-top: 14px;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
}

/* ===== INPUT STYLE ===== */
input {
    border: 1px solid #374151;
    background: #111827;
    color: #ffffff;
}

input::placeholder {
    color: #9ca3af;
}

input:focus {
    outline: none;
    border-color: #4a6fe3;
}

/* ===== BUTTON STYLE ===== */
button {
    background: #4a6fe3;
    color: #ffffff;
    border: none;
    font-size: 15px;
    cursor: pointer;
}

button:hover {
    background: #3a5bd8;
}

/* ===== ERROR ===== */
.error {
    color: #f87171;
    margin-top: 14px;
    font-size: 14px;
}

/* ===== BACK LINK ===== */
.back-link {
    display: inline-block;
    margin-top: 18px;
    font-size: 14px;
    color: #9ca3af;
    text-decoration: none;
}

.back-link:hover {
    color: #ffffff;
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="login-box">

    <img src="/images/logo.jpg" class="logo">

    <h2 th:text="${role == 'admin' ? 'Admin Login' : 'Sub-Admin Login'}"></h2>
    <p>Employee Management System</p>

    <form method="post" action="/login">
        <input type="hidden" name="role" th:value="${role}">

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div th:if="${error}" class="error">
        ❌ Username or password is wrong
    </div>

    <a href="/" class="back-link">← Back to Main Login</a>

</div>

</body>
</html>
